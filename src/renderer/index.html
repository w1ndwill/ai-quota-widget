<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Quota</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="shell" class="shell" title="点击空白处刷新">
      <section class="panel">
        <header class="titlebar">
          <div class="brand">
            <span class="app-icon" aria-hidden="true"></span>
            <strong>AIbar</strong>
            <time id="updatedAt" class="updated">--:--:--</time>
          </div>
          <div class="window-actions">
            <span class="plan-pill">PLUS</span>
            <button id="refreshButton" class="icon-button" title="手动刷新" aria-label="手动刷新">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 7v5h-5M5 17v-5h5M18 12a6 6 0 0 0-10.2-4.3L5 10M6 12a6 6 0 0 0 10.2 4.3L19 14" />
              </svg>
            </button>
            <button id="pinButton" class="icon-button" title="置顶" aria-label="置顶">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 4h6l-1 6 4 4v2h-5v5h-2v-5H6v-2l4-4-1-6z" />
              </svg>
            </button>
            <button id="settingsButton" class="icon-button" title="设置" aria-label="设置">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3" />
                <path d="M12 1l2.4 5.2L20 7.5l-3.6 4.2.6 5.3-5-2.4-5 2.4.6-5.3L4 7.5l5.6-1.3L12 1z" />
              </svg>
            </button>
            <button id="compactButton" class="icon-button" title="切换紧凑视图" aria-label="缩小" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path id="compactIcon" d="M7 8h10v8H7z" />
              </svg>
            </button>
            <button id="closeButton" class="icon-button" title="关闭" aria-label="关闭">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 8l8 8M16 8l-8 8" />
              </svg>
            </button>
          </div>
        </header>

        <section class="dashboard">
          <aside class="quota-side interactive-card" data-expand-title="额度概览" tabindex="0" title="完整视图中点击查看详情；紧凑视图中点击刷新" aria-label="额度概览，点击放大">
            <section class="quota-rings">
              <div id="quotaRing" class="ring detail-target" data-detail-key="quotaRing">
                <svg class="ring-chart" viewBox="0 0 150 150" role="group" aria-label="额度分层圆环">
                  <defs>
                    <linearGradient id="shortRingGradient" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0" stop-color="#75df91" />
                      <stop offset="1" stop-color="#36b86a" />
                    </linearGradient>
                    <linearGradient id="longRingGradient" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0" stop-color="#8f84f4" />
                      <stop offset="1" stop-color="#6556df" />
                    </linearGradient>
                  </defs>
                  <circle id="shortRingTrack" class="ring-track ring-track-outer" cx="75" cy="75" r="62" />
                  <circle id="shortRingArc" class="ring-arc ring-arc-short" cx="75" cy="75" r="62" pathLength="100" tabindex="0" role="button" aria-label="5 小时额度" />
                  <circle id="longRingTrack" class="ring-track ring-track-inner" cx="75" cy="75" r="48" />
                  <circle id="longRingArc" class="ring-arc ring-arc-long" cx="75" cy="75" r="48" pathLength="100" tabindex="0" role="button" aria-label="7 天额度" />
                </svg>
                <div class="ring-core">
                  <span class="ring-value ring-value-short"><b id="ringShort">--%</b> 5h</span>
                  <span class="ring-value ring-value-long"><b id="ringLong">--%</b> 7d</span>
                  <small>剩余</small>
                </div>
              </div>
              <div class="ring-notes">
                <div><i class="dot green-dot"></i><span id="shortResetCompact">--</span></div>
                <div><i class="dot purple-dot"></i><span id="longResetCompact">--</span></div>
              </div>
            </section>

            <section class="quota-list">
              <article class="metric">
                <div class="metric-main">
                  <div class="metric-title" id="shortLabel">5小时</div>
                  <div class="bar detail-target" data-detail-key="shortBar" tabindex="0"><span id="shortBar"></span></div>
                </div>
                <div class="metric-side">
                  <strong id="shortValue">--%</strong>
                  <span id="shortReset">等待数据</span>
                </div>
              </article>

              <article class="metric">
                <div class="metric-main">
                  <div class="metric-title" id="longLabel">周限额</div>
                  <div class="bar detail-target" data-detail-key="longBar" tabindex="0"><span id="longBar"></span></div>
                </div>
                <div class="metric-side">
                  <strong id="longValue">--%</strong>
                  <span id="longReset">等待数据</span>
                </div>
              </article>
            </section>

            <article id="resetRow" class="metric reset-row interactive-card" data-expand-title="重置卡" tabindex="0" role="button" aria-expanded="false" aria-label="重置卡，点击查看全部卡片">
              <div class="metric-main">
                <div class="metric-title">重置卡</div>
                <p class="reset-sub" id="resetSub">可恢复 5 小时与周额度</p>
              </div>
              <div class="metric-side">
                <strong id="resetCount">-- 张</strong>
                <span id="resetExpiry">到期未知</span>
              </div>
            </article>
          </aside>

          <section class="token-grid" aria-label="Token 分析">
            <article class="token-card total-token interactive-card" data-expand-title="近 24 小时 Token" tabindex="0" aria-label="近 24 小时 Token，点击放大">
              <div class="card-head">
                <span id="tokenCardTitle">近 24h Token</span>
                <div class="token-range-toggle" id="tokenRangeToggle">
                  <button class="range-btn active" data-range="24h" aria-pressed="true">24h</button>
                  <button class="range-btn" data-range="cumulative" aria-pressed="false">累计</button>
                  <span class="range-slider"></span>
                </div>
              </div>
              <div class="token-card-body" id="tokenCardBody">
                <b id="tokenCost">本地会话</b>
                <strong id="totalTokens">--</strong>
                <div class="token-bar detail-target" data-detail-key="tokenBar" tabindex="0">
                  <span id="inputSegment"></span>
                  <span id="cacheSegment"></span>
                  <span id="outputSegment"></span>
                </div>
                <dl class="token-breakdown">
                  <div><dt id="inputLabel">输入</dt><dd id="inputTokens">--</dd></div>
                  <div><dt id="cachedLabel">缓存</dt><dd id="cachedTokens">--</dd></div>
                  <div><dt id="outputLabel">输出</dt><dd id="outputTokens">--</dd></div>
                </dl>
              </div>
            </article>

            <article class="token-card interactive-card" data-expand-title="命中率分析" tabindex="0" aria-label="命中率分析，点击放大">
              <div class="card-head">
                <span>命中率分析</span>
                <b id="hitDelta">暂无数据</b>
              </div>
              <strong id="cacheHitRate">--%</strong>
              <p id="hitSummary">当前接口没有返回缓存命中率字段</p>
            </article>


            <article class="token-card model-usage-card interactive-card" data-expand-title="按模型 Token 用量" tabindex="0" aria-label="按模型 Token 用量，点击放大">
              <div class="card-head">
                <span>按模型 Token 用量</span>
                <b id="modelUsageSummary">近 24 小时</b>
              </div>
              <div id="modelUsageList" class="model-usage-list"><span class="model-empty">暂无本地会话数据</span></div>
            </article>
          </section>

          <section class="analysis-grid">
            <article class="trend-card interactive-card" data-expand-title="Token 消耗趋势" tabindex="0" aria-label="Token 消耗趋势，点击放大">
              <div class="trend-head"><strong>Token 消耗趋势</strong><span id="trendDelta">24 小时 / 7 天</span></div>
              <div class="trend-panels">
                <section class="trend-panel">
                  <div class="trend-panel-head"><b>近 24 小时</b><span id="trend24Summary">数据积累中</span></div>
                  <div class="chart-shell">
                    <svg id="trend24Chart" class="token-trend-chart" viewBox="0 0 420 112" preserveAspectRatio="none" role="img" aria-label="近 24 小时 Token 消耗">
                      <defs><linearGradient id="trend24Gradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#58c868" stop-opacity=".28"/><stop offset="1" stop-color="#58c868" stop-opacity="0"/></linearGradient></defs>
                      <g id="trend24Axes" class="chart-axes"></g>
                      <path id="trend24Area" class="trend-area trend-area-24"></path>
                      <path id="trend24Line" class="trend-line green-line"></path>
                      <line id="trend24Cursor" class="chart-cursor" y1="10" y2="86"></line>
                      <circle id="trend24Point" class="chart-point chart-point-24" r="4"></circle>
                      <rect class="chart-hit" x="48" y="8" width="360" height="80" data-chart="24"></rect>
                    </svg>
                    <div id="trend24Tooltip" class="chart-tooltip"></div>
                  </div>
                </section>
                <section class="trend-panel">
                  <div class="trend-panel-head"><b>近 7 天</b><span id="trend7Summary">日消耗</span></div>
                  <div class="chart-shell">
                    <svg id="trend7Chart" class="token-trend-chart" viewBox="0 0 420 112" preserveAspectRatio="none" role="img" aria-label="近 7 天 Token 消耗">
                      <defs><linearGradient id="trend7Gradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6757e7" stop-opacity=".22"/><stop offset="1" stop-color="#6757e7" stop-opacity="0"/></linearGradient></defs>
                      <g id="trend7Axes" class="chart-axes"></g>
                      <path id="trend7Area" class="trend-area trend-area-7"></path>
                      <path id="trend7Line" class="trend-line purple-line"></path>
                      <line id="trend7Cursor" class="chart-cursor" y1="10" y2="86"></line>
                      <circle id="trend7Point" class="chart-point chart-point-7" r="4"></circle>
                      <rect class="chart-hit" x="48" y="8" width="360" height="80" data-chart="7"></rect>
                    </svg>
                    <div id="trend7Tooltip" class="chart-tooltip"></div>
                  </div>
                </section>
              </div>
              <div class="trend-footer">
                <strong id="trendTotal">--</strong>
                <span id="trendAverage">悬浮曲线查看数值</span>
              </div>
            </article>

            <article class="heat-card interactive-card" data-expand-title="每日Token消耗" tabindex="0" aria-label="每日Token消耗，点击放大">
              <div class="trend-head">
                <strong>每日Token消耗</strong>
                <span id="hitTrendLabel">最近 30 天</span>
              </div>
              <div class="heatmap-wrap">
                <div id="hitHeatmap" class="hit-heatmap"></div>
                <div id="heatTooltip" class="heat-tip"></div>
              </div>
              <div class="heat-footer">
                <span id="heatDateStart">--</span>
                <div class="heat-scale">
                  <span>低</span>
                  <i></i><i></i><i></i><i></i><i></i>
                  <span>高</span>
                </div>
                <span id="heatDateEnd">--</span>
              </div>
            </article>
          </section>
        </section>
      </section>
    </main>
    <section id="resetDialog" class="reset-dialog" aria-hidden="true">
      <div class="reset-dialog-backdrop"></div>
      <div class="reset-dialog-card" role="dialog" aria-modal="true" aria-labelledby="resetDialogTitle">
        <header class="reset-dialog-head">
          <div>
            <strong id="resetDialogTitle">全部重置卡</strong>
            <span id="resetDialogSummary">暂无重置卡</span>
          </div>
          <button id="resetDialogClose" class="icon-button" title="关闭" aria-label="关闭重置卡列表">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8l8 8M16 8l-8 8" /></svg>
          </button>
        </header>
        <div id="resetDialogList" class="reset-dialog-list"></div>
      </div>
    </section>
    <section id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="settings-backdrop"></div>
      <div class="settings-card" role="dialog" aria-label="设置">
        <header class="settings-head">
          <strong>设置</strong>
          <button id="settingsClose" class="icon-button" title="关闭" aria-label="关闭设置">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 8l8 8M16 8l-8 8" />
            </svg>
          </button>
        </header>
        <div class="settings-body">
          <label class="setting-row">
            <span id="langLabel">语言 / Language</span>
            <select id="langSelect">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <label class="setting-row">
            <span id="themeLabel">主题</span>
            <select id="themeSelect">
              <option value="light" id="themeOptLight">亮色</option>
              <option value="dark" id="themeOptDark">暗色</option>
            </select>
          </label>
        </div>
        <footer class="settings-foot">
          <span id="settingsStatus" class="settings-status"></span>
          <button id="settingsSave" class="settings-save-btn">保存</button>
        </footer>
      </div>
    </section>
    <script src="./renderer.js"></script>
  </body>
</html>
